name: Update Parcel JSON (Manual)

on:
  workflow_dispatch:   # 手動実行専用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Parcel Scraper
        run: node parcelScraper.js
      - name: Commit & Push JSONs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add parcels/*.json
          git commit -m "Manual update of Parcel JSONs"
          git push
